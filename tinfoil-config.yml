cvm-version: 0.7.3
cpus: 32
gpus: 8
memory: 524288

models:
  - name: "grok-2"
    repo: "xai-org/grok-2@daf4395a80ad177386cfe39641b64fc12b1d70ed"
    mpk: "695363c502c9cbaa2a111caf4cb28ba76e80c57d159fb364524ad19ffdbdc65a_539040456704_19c36cba-d4d0-5be1-ab22-1a10dc7313e9"

containers:
  - name: "grok-2"
    image: "lmsysorg/sglang:nightly-dev-cu13-20260331-b4f79c0d@sha256:bf003fc04a517e49f05919ab136dab1fca58e46b11190097d31eb5d324a3a4ea"
    runtime: nvidia
    gpus: all
    ipc: host
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    env:
      - HF_HUB_OFFLINE: "1"
      - TRANSFORMERS_OFFLINE: "1"
    command: [
      "--model-path", "/tinfoil/mpk/mpk-695363c502c9cbaa2a111caf4cb28ba76e80c57d159fb364524ad19ffdbdc65a",
      "--tokenizer-path", "/tinfoil/mpk/mpk-695363c502c9cbaa2a111caf4cb28ba76e80c57d159fb364524ad19ffdbdc65a/tokenizer.tok.json",
      "--tp", "8",
      "--quantization", "fp8",
      "--attention-backend", "triton",
      "--mem-fraction-static", "0.9",
      "--context-length", "32768",
      "--chunked-prefill-size", "4096",
      "--served-model-name", "grok-2",
      "--host", "0.0.0.0",
      "--port", "8001",
    ]

shim:
  listen-port: 443
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/completions
    - /v1/models
  paths:
    - /v1/chat/completions
    - /v1/completions
    - /v1/models
    - /metrics
    - /health
